<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Lockdown Mode Check</title>
</head>

<body>
    <script>
        function applePlatformCheck() {
            if ((navigator.platform === "iPhone" && /iPhone|iPod/.test(navigator.userAgent) && navigator.maxTouchPoints >= 5 && navigator.vendor === "Apple Computer, Inc.") ||
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints >= 5 && navigator.vendor === "Apple Computer, Inc.") ||
                (navigator.platform === "MacIntel" && /Macintosh/.test(navigator.userAgent) && navigator.maxTouchPoints === 0 && navigator.vendor === "Apple Computer, Inc.")) {
                console.log("%c[Lockdown Mode Check]%c Basic Apple platform check %cPASS%c. Device may running iOS/iPadOS/macOS, or spoofed.", "font-weight: bold;", "", "font-weight: bold; color: green;", "");
                return true;
            } else {
                console.log("%c[Lockdown Mode Check]%c Basic Apple platform check %cFAIL%c. Device may not running Apple OSes.", "font-weight: bold;", "", "font-weight: bold; color: red;", "");
                return false;
            }
        }

        const missingFileReader = typeof FileReader === "undefined";
        const missingWASM = typeof WebAssembly === "undefined";
        const missingMathML = typeof MathMLElement === "undefined";
        const missingWebGPU = typeof navigator.gpu === "undefined";
        const missingWebGL = !document.createElement('canvas').getContext('webgl');
        const missingWebRTC = typeof RTCPeerConnection === "undefined";

        function basicDisabledFeaturesCheck() {
            if (missingFileReader && missingWASM && missingMathML && missingWebGPU && missingWebGL && missingWebRTC) {
                console.log("%c[Lockdown Mode Check]%c Basic disabled features check %cPASS%c.", "font-weight: bold;", "", "font-weight: bold; color: green;", "");
                return true;
            } else {
                console.log("%c[Lockdown Mode Check]%c Basic disabled features check %cFAIL%c. Device may not under Lockdown Mode.", "font-weight: bold;", "", "font-weight: bold; color: red;", "");
                return false;
            }
        }

        async function indexedDBCheck() {
            return new Promise((ok) => {
                if (!window.indexedDB) {
                    return ok(true);
                }
                const testIndexedDB = window.indexedDB.open("LockdownModeCheck", 1);
                const timeout = setTimeout(() => ok(true), 3000);
                testIndexedDB.onerror = () => {
                    clearTimeout(timeout);
                    ok(true);
                };
                testIndexedDB.onsuccess = () => {
                    clearTimeout(timeout);
                    testIndexedDB.result.close();
                    window.indexedDB.deleteDatabase("LockdownModeCheck");
                    ok(false);
                };
            });
        }

        async function strongDisabledFeaturesCheck() {
            if (await indexedDBCheck()) {
                console.log("%c[Lockdown Mode Check]%c Strong disabled features check %cPASS%c.", "font-weight: bold;", "", "font-weight: bold; color: green;", "");
                return true;
            } else {
                console.log("%c[Lockdown Mode Check]%c Strong disabled features check %cFAIL%c. Device may not under Lockdown Mode.", "font-weight: bold;", "", "font-weight: bold; color: red;", "");
                return false;
            }
        }

        let isLockdownMode = false;
        let basicCheck1 = false;
        let basicCheck2 = false;
        let strongCheck2 = false;

        async function lockdownModeCheck() {
            basicCheck1 = applePlatformCheck();
            basicCheck2 = basicDisabledFeaturesCheck();
            strongCheck2 = await strongDisabledFeaturesCheck();
            if (basicCheck1 && basicCheck2 && strongCheck2) {
                return true;
            } else {
                return false;
            }
        }

        let checkResult = " ";
        (async () => {
            if (await lockdownModeCheck()) {
                checkResult = `
<h1>Lockdown Mode Check</h1>
<noscript>
    <p style="color: brown;">JavaScript is disabled. Can't run check.</p>
</noscript>
<p>
    Your device is under 'Lockdown Mode'.
</p>
<pre>
    applePlatformCheck: ${basicCheck1}
    basicDisabledFeaturesCheck: ${basicCheck2}
    strongDisabledFeaturesCheck: ${strongCheck2}
</pre>
`;
            } else {
                checkResult = `
<h1>Lockdown Mode Check</h1>
<noscript>
    <p style="color: brown;">JavaScript is disabled. Can't run check.</p>
</noscript>
<p>
    Your device isn't under 'Lockdown Mode'.
</p>
<pre>
applePlatformCheck: ${basicCheck1}
basicDisabledFeaturesCheck: ${basicCheck2}
strongDisabledFeaturesCheck: ${strongCheck2}
</pre>`;
            }
            document.body.innerHTML = checkResult;
        })();
    </script>
</body>

</html>

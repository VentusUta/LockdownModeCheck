<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockdown Mode Check</title>
</head>

<body>
    <h1>Lockdown Mode Check</h1>
    <noscript>
        <p style="color: maroon;">JavaScript is disabled. Can't run check.</p>
    </noscript>
    <script>
        function applePlatformCheck() {
            if ((navigator.platform === "iPhone" && /iPhone|iPod/.test(navigator.userAgent) && navigator.maxTouchPoints >= 5 && navigator.vendor === "Apple Computer, Inc.") ||
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints >= 5 && navigator.vendor === "Apple Computer, Inc.") ||
                (navigator.platform === "MacIntel" && /Macintosh/.test(navigator.userAgent) && navigator.maxTouchPoints === 0 && navigator.vendor === "Apple Computer, Inc.")) {
                console.log("%c[Lockdown Mode Check]%c Apple platform check %cPASS%c. Device may running iOS/iPadOS/macOS, or spoofed.", "font-weight: bold;", "", "font-weight: bold; color: green;", "");
                return true;
            } else {
                console.log("%c[Lockdown Mode Check]%c Apple platform check %cFAIL%c. Device may not running Apple OSes.", "font-weight: bold;", "", "font-weight: bold; color: red;", "");
                return false;
            }
        }

        const missingFileReader = typeof FileReader === "undefined";
        const missingWASM = typeof WebAssembly === "undefined";
        const missingMathML = typeof MathMLElement === "undefined";
        const missingWebGPU = typeof navigator.gpu === "undefined";
        const missingWebGL = !document.createElement('canvas').getContext('webgl');
        const missingWebRTC = typeof RTCPeerConnection === "undefined";

        async function indexedDBCheck() {
            return new Promise((ok) => {
                if (!window.indexedDB) {
                    return ok(true);
                }
                const testIndexedDB = window.indexedDB.open("LockdownModeCheck", 1);
                const timeout = setTimeout(() => ok(true), 3000);
                testIndexedDB.onerror = () => {
                    clearTimeout(timeout);
                    ok(true);
                };
                testIndexedDB.onsuccess = () => {
                    clearTimeout(timeout);
                    testIndexedDB.result.close();
                    window.indexedDB.deleteDatabase("LockdownModeCheck");
                    ok(false);
                };
            });
        }

        async function disabledFeaturesCheck() {
            if (missingFileReader && missingWASM && missingMathML && missingWebGPU && missingWebGL && missingWebRTC && (await indexedDBCheck())) {
                console.log("%c[Lockdown Mode Check]%c Disabled features check %cPASS%c.", "font-weight: bold;", "", "font-weight: bold; color: green;", "");
                return true;
            } else {
                console.log("%c[Lockdown Mode Check]%c Disabled features check %cFAIL%c. Device may not under Lockdown Mode.", "font-weight: bold;", "", "font-weight: bold; color: red;", "");
                return false;
            }
        }

        let platformResult = false;
        let featuresResult = false;
        const testPass = `<span style="font-weight: bold; color: green;">PASS</span>`
        const testFail = `<span style="font-weight: bold; color: maroon;">FAIL</span>`
        const featureDisabled = `<span style="font-weight: bold; color: green;">DISABLED</span>`
        const featureEnabled = `<span style="font-weight: bold; color: maroon;">ENABLED</span>`

        async function lockdownModeCheck() {
            platformResult = applePlatformCheck();
            featuresResult = disabledFeaturesCheck();
            if (platformResult && featuresResult) {
                return true;
            } else {
                return false;
            }
        }

        let checkResult = " ";
        (async () => {
            const platformResultPassOrFail = platformResult ? testPass : testFail;
            const featuresResultPassOrFail = featuresResult ? testPass : testFail;
            const fileReaderResultPassOrFail = missingFileReader ? featureDisabled : featureEnabled;
            const WASMResultPassOrFail = missingWASM ? featureDisabled : featureEnabled;
            const MathMLResultPassOrFail = missingMathML ? featureDisabled : featureEnabled;
            const WebGPUResultPassOrFail = missingWebGPU ? featureDisabled : featureEnabled;
            const WebGLResultPassOrFail = missingWebGL ? featureDisabled : featureEnabled;
            const WebRTCResultPassOrFail = missingWebRTC ? featureDisabled : featureEnabled;
            const indexedDBResultPassOrFail = (await indexedDBCheck()) ? featureDisabled : featureEnabled;
            if (await lockdownModeCheck()) {
                checkResult = `
<h1>Lockdown Mode Check</h1>
<p>
    Your device is under ‘Lockdown Mode’.
</p>
<p>
    <ul>
        <li>Apple platform test: ${platformResultPassOrFail}</li>
        <li>Disabled features test: ${featuresResultPassOrFail}</li>
        <ul>
            <li>FileReader API: ${fileReaderResultPassOrFail}</li>
            <li>WASM: ${WASMResultPassOrFail}</li>
            <li>MathML: ${MathMLResultPassOrFail}</li>
            <li>WebGPU: ${WebGPUResultPassOrFail}</li>
            <li>WebGL: ${WebGLResultPassOrFail}</li>
            <li>WebRTC: ${WebRTCResultPassOrFail}</li>
            <li>IndexedDB: ${indexedDBResultPassOrFail}</li>
        </ul>
    </ul>
</p>
`;
            } else {
                checkResult = `
<h1>Lockdown Mode Check</h1>
<p>
    Your device isn’t under ‘Lockdown Mode’.
</p>
<p>
    <ul>
        <li>Apple platform test: ${platformResultPassOrFail}</li>
        <li>Disabled features test: ${featuresResultPassOrFail}</li>
        <ul>
            <li>FileReader API: ${fileReaderResultPassOrFail}</li>
            <li>WASM: ${WASMResultPassOrFail}</li>
            <li>MathML: ${MathMLResultPassOrFail}</li>
            <li>WebGPU: ${WebGPUResultPassOrFail}</li>
            <li>WebGL: ${WebGLResultPassOrFail}</li>
            <li>WebRTC: ${WebRTCResultPassOrFail}</li>
            <li>IndexedDB: ${indexedDBResultPassOrFail}</li>
        </ul>
    </ul>
</p>
`;
            }
            document.body.innerHTML = checkResult;
        })();
    </script>
</body>

</html>
